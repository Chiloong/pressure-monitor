name: EnvAlert Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Build package
        run: |
          mkdir -p dist
          cp -r *.py dist/ || true
          cp -r state dist/ || true
          cp README.md dist/ || true
          tar -czf envalert-${VERSION}.tar.gz dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: "EnvAlert ${{ env.VERSION }}"
          body: |
            🚀 EnvAlert Release ${{ env.VERSION }}

            ## 内容说明
            - 自动打包 main.py
            - 包含 state 状态数据
            - 当前运行系统快照
          files: envalert-${{ env.VERSION }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
